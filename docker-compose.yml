services:
  triple_rag:
    build: .
    image: triple_rag_phd:latest
    container_name: triple_rag_dev
    
    # GPU 할당 (RTX 4090 전체)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    # 메모리 (필요시 조정)
    shm_size: '16gb'
    
    # 볼륨 마운트 (Windows ↔ 컨테이너 파일 공유)
    volumes:
      - ./src:/workspace/src
      - ./tests:/workspace/tests
      - ./scripts:/workspace/scripts
      - ./data:/workspace/data
      - ./cache:/workspace/cache
      - ./results:/workspace/results
      - ./configs:/workspace/configs
      - ./notebooks:/workspace/notebooks
      - ./logs:/workspace/logs
      - ./conftest.py:/workspace/conftest.py
      - ./pytest.ini:/workspace/pytest.ini
    
    # 포트 (Jupyter, TensorBoard)
    ports:
      - "8888:8888"
      - "6006:6006"
    
    # 환경변수
    env_file:
      - .env
    
    # 컨테이너 유지
    tty: true
    stdin_open: true
    command: /bin/bash